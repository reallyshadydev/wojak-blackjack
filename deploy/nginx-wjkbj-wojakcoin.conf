# WojakCoin Blackjack — wjkbj.wojakcoin.cash
# Proxies to house server (API + built web app) on 127.0.0.1:8787
#
# Install:
#   sudo cp deploy/wojak-blackjack.service /etc/systemd/system/
#   sudo systemctl enable --now wojak-blackjack
#   sudo cp deploy/nginx-wjkbj-wojakcoin.conf /etc/nginx/sites-available/wjkbj.wojakcoin.cash.conf
#   sudo ln -sf /etc/nginx/sites-available/wjkbj.wojakcoin.cash.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d wjkbj.wojakcoin.cash

server {
    listen 80;
    listen [::]:80;
    server_name wjkbj.wojakcoin.cash;

    include snippets/bot-block.conf;
    include snippets/security-global.conf;

    location /.well-known/acme-challenge/ {
        default_type text/plain;
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
